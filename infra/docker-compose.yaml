name: self-dev

services:
  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      args:
        MODE: ${MODE:-stage}
    restart: unless-stopped
    networks:
      - self-dev
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`self-dev.test`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"


networks:
  self-dev:
    name: "self-dev"
    external: true
