name: Build Prod Image

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/selfdevcomp/frontend

jobs:
  build-prod:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build --no-cache --build-arg MODE=prod -f infra/Dockerfile -t $IMAGE:${{ github.sha }} .

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: |
          docker push $IMAGE:${{ github.sha }}

      - name: Trigger prod deploy
        run: |
          curl \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.INFRA_TOKEN }}" \
            https://api.github.com/repos/selfdevcomp/infrastructure/dispatches \
            -d '{
              "event_type":"frontend-deploy-prod",
              "client_payload":{
                "image":"'"$IMAGE:${{ github.sha }}"'"
              }
            }'
