version: "3"

tasks:
  default:
    cmds:
      - task --list
    silent: true  
  
  build-frontend:
    desc: build frontend side for develope
    cmds:
      - docker build -t self-dev-frontend -f infra/Dockerfile .

  dev-frontend:
    desc: up only frontend side of project and develope in real time
    cmds:
      - npm run dev
